services:

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: agiliz-evolution
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: agiliz-postgres
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agiliz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  runtime:
    build:
      context: .
      dockerfile: Agiliz.Runtime/Dockerfile
    container_name: agiliz-runtime
    ports:
      - "5000:8080"
    volumes:
      - ./configs:/app/configs
    environment:
      ConfigsDir: /app/configs
      GROQ_API_KEY:              ${GROQ_API_KEY}
      ANTHROPIC_API_KEY:         ${ANTHROPIC_API_KEY}
      EVOLUTION_API_URL:         http://evolution-api:8080/api
      EVOLUTION_API_TOKEN:       ${EVOLUTION_API_TOKEN:-change-me-default-token}
    restart: unless-stopped
    depends_on:
      - evolution-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  wizard:
    build:
      context: .
      dockerfile: Agiliz.Wizard/Dockerfile
    container_name: agiliz-wizard
    ports:
      - "5001:8080"
    volumes:
      - ./configs:/app/configs
    environment:
      ConfigsDir: /app/configs
      GROQ_API_KEY:       ${GROQ_API_KEY}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
    restart: unless-stopped
    depends_on:
      - runtime

volumes:
  postgres_data:
  redis_data:
