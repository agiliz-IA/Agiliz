services:

  runtime:
    build:
      context: .
      dockerfile: Agiliz.Runtime/Dockerfile
    container_name: agiliz-runtime
    ports:
      - "5000:8080"
    volumes:
      - ./configs:/app/configs
    environment:
      ConfigsDir: /app/configs
      GROQ_API_KEY:        ${GROQ_API_KEY}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY}
      TWILIO_ACCOUNT_SID:  ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN:   ${TWILIO_AUTH_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  wizard:
    build:
      context: .
      dockerfile: Agiliz.Wizard/Dockerfile
    container_name: agiliz-wizard
    ports:
      - "5001:8080"
    volumes:
      - ./configs:/app/configs
    environment:
      ConfigsDir: /app/configs
      GROQ_API_KEY:       ${GROQ_API_KEY}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
    restart: unless-stopped
    depends_on:
      - runtime
